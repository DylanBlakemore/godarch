# golangci-lint configuration (schema v2).
#
# Per plan/00-foundation/04-tooling-ci.md: a sane preset of govet, staticcheck,
# errcheck, ineffassign (all on by default in v2) plus revive. Lint is run
# unscoped (whole repo) before every push — see mise.toml `lint` / `ci` tasks.
version: "2"

linters:
  # Keep the v2 default set (errcheck, govet, ineffassign, staticcheck, unused)
  # and add revive on top.
  enable:
    - revive
  settings:
    revive:
      # A curated, sane rule set. The pedantic per-symbol documentation rules
      # (notably `exported`) are intentionally omitted: the codebase documents
      # const/type groups with block comments rather than one comment per
      # identifier, and that house style should not be a lint failure.
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code
        - name: var-declaration
        - name: var-naming
  exclusions:
    generated: lax
    presets:
      # Excludes the conventional "error not checked" noise, including writes to
      # stdout/stderr via the fmt.Fprint* family — there is nothing useful a CLI
      # can do if writing to its own output stream fails.
      - std-error-handling

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/dylanblakemore/godarch
